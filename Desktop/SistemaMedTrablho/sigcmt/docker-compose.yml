version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: sigcmt_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: sigcmt
      POSTGRES_PASSWORD: sigcmt_dev_2025
      POSTGRES_DB: sigcmt
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U sigcmt']
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: sigcmt_redis
    restart: unless-stopped
    command: redis-server --requirepass sigcmt_redis_2025
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', '-a', 'sigcmt_redis_2025', 'ping']
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:
